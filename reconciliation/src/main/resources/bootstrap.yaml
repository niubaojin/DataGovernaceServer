server:
  port: 8223
nacosServer:
  server-Addr: 10.1.15.132:8848
  namespace: SH_SHUHUI360
  username: nacos
  password: nacos

spring:
  application:
    name: reconciliation
  profiles:
    active: prod
  cloud:
    nacos:
      discovery:
        server-addr: ${nacosServer.server-Addr}
        namespace: ${nacosServer.namespace}
        group: SH_DATAFACTORY
        password: ${nacosServer.password}
        username: ${nacosServer.username}
      config:
        password: ${nacosServer.password}
        username: ${nacosServer.username}
        server-addr: ${nacosServer.server-Addr}
        namespace: ${nacosServer.namespace}
        group: SH_DATAFACTORY
        file-extension: yaml
        shared-configs[0]:
          data-id: shuhui_common.yaml
          group: SH_COMMON
          refresh: true
        shared-configs[1]:
          data-id: datafactory-common.yaml
          group: SH_DATAFACTORY
          refresh: true

logging:
  level:
    com.alibaba.cloud.nacos.client: debug

