spring.application.name=datagovernance
server.servlet.context-path=/datagovernance
server.address=${spring.cloud.client.ip-address}
server.port=9081
server.max-http-request-header-size = 30000000

nacosServer.serverAddr=10.1.15.132:8848
nacosServer.namespace=SH_SHUHUI360
nacosServer.name=nacos
nacosServer.password=nacos

spring.cloud.nacos.discovery.server-addr=${nacosServer.serverAddr}
spring.cloud.nacos.discovery.namespace=${nacosServer.namespace}
spring.cloud.nacos.discovery.group=SH_DATAFACTORY
spring.cloud.nacos.discovery.username=${nacosServer.name}
spring.cloud.nacos.discovery.password=${nacosServer.password}
spring.cloud.nacos.config.server-addr=${nacosServer.serverAddr}
spring.cloud.nacos.config.namespace= ${nacosServer.namespace}
spring.cloud.nacos.config.group=SH_DATAFACTORY
spring.cloud.nacos.config.username=${nacosServer.name}
spring.cloud.nacos.config.password=${nacosServer.password}
spring.cloud.nacos.config.file-extension=yaml
spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.shared-configs[0].data-id=datafactory-common.yaml
spring.cloud.nacos.config.shared-configs[0].group=SH_DATAFACTORY
spring.cloud.nacos.config.shared-configs[0].refresh=true
#spring.cloud.nacos.config.shared-configs[1].data-id=datagovernance.yaml
#spring.cloud.nacos.config.shared-configs[1].group=SH_DATAFACTORY
#spring.cloud.nacos.config.shared-configs[1].refresh=true
spring.profiles.active=prod

##########################logback##############################
logging.config=classpath:logback-spring.xml
logging.level.com.synway.governace.dao=debug
# mybatisMapper
mybatis.configuration.call-setters-on-nulls=true
mybatis.configuration.cache-enabled=false
mybatis.configuration.lazy-loading-enabled=true
mybatis.configuration.aggressive-lazy-loading=false
mybatis.configuration.multiple-result-sets-enabled=true
mybatis.configuration.use-column-label=true
mybatis.configuration.default-statement-timeout=25000
mybatis.configuration.use-generated-keys=false
mybatis.configuration.auto-mapping-behavior=full
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

isExportAndMotify=true
assets.large.screen.version=tgj