apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: datarelation
  namespace: datagovernance
spec:
  replicas: 1
  selector:
    matchLabels:
      project: datagovernance
      app: datarelation
  template:
    metadata:
      labels:
        project: datagovernance
        app: datarelation
    spec:
      containers:
        - name: datarelation
          image: 10.1.7.121/datagovernance/datarelation:latest
          imagePullPolicy: Always
          env:
            - name: eureka.client.service-url.defaultZone
              value: http://10.1.8.159:8041/eureka/
            - name: spring.cloud.config.label
              value: huaWeiVersion
            - name: standardServiceNameVersion
              value: "1.5"
          ports:
            - containerPort: 8040
              name: web
              protocol: TCP
              hostPort: 8040
          resources:
            limits:
              cpu: 600m
              memory: 2Gi
            requests:
              cpu: 300m
              memory: 100Mi
#        livenessProbe:
#          httpGet:
#            path: /
#            port: 8771
#          initialDelaySeconds: 60
#          timeoutSeconds: 20
#        readinessProbe:
#          httpGet:
#            path: /
#            port: 8771
#          initialDelaySeconds: 60
#          timeoutSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: datarelation
  namespace: datagovernance
  labels:
    project: datagovernance
    app: datarelation
    svc: datarelation-svc
spec:
  selector:
    project: datagovernance
    app: datarelation
  ports:
    - name: web
      port: 8040
      targetPort: 8040
  type: NodePort
