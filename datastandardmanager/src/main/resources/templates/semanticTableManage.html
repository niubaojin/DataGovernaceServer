<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<!--my-theme-->
		<link rel="stylesheet" href="myCss/my-base.css">

		<script type="text/javascript" src="bootstrap/jQuery/jquery-3.0.0.js"></script>
		<script type="text/javascript" src="bootstrap/jQuery/jquery.min.js"></script>
		<script type="text/javascript" src="bootstrap/jQuery/jquery.serializejson.js"></script>

		<script type="text/javascript" src="bootstrap/js/bootstrap.js"></script>
		<script type="text/javascript" src="bootstrap-table/bootstrap-table.js"></script>
		<script type="text/javascript" src="bootstrap/js/bootstrap-table-zh-CN.js"></script>

		<link rel="stylesheet" href="bootstrap/css/bootstrap.css">
		<link rel="stylesheet" href="bootstrap-table/bootstrap-table.css">
		<link rel="stylesheet" href="myCss/bootstrap-tablePage.css">

		<!-- 时间插件 -->
		<link rel="stylesheet"  href="bootstrap-datetimepicker/bootstrap-datetimepicker.css"/>
		<script type="text/javascript" src="bootstrap/js/moment-with-locales.js"></script>
		<script type="text/javascript" src="bootstrap-datetimepicker/bootstrap-datetimepicker.min.js"></script>
		<script type="text/javascript" src="bootstrap-datetimepicker/bootstrap-datetimepicker.zh-CN.js"></script>

		<!--上传下载插件-->
		<link href="bootstrap/bootstrap-fileinput/css/fileinput.css" rel="stylesheet"/>
		<script src="bootstrap/bootstrap-fileinput/js/fileinput.js"></script>
		<script src="bootstrap/bootstrap-fileinput/js/locales/zh.js"></script>

		<script type="text/javascript" src="bootstrap/js/toastr.min.js"></script>
		<link rel="stylesheet" href="bootstrap/css/toastr.css">
       <!--jumpto-->
		<link rel="stylesheet" href="page-jumpto/bootstrap-table-jumpto.css">
		<script type="text/javascript" src="page-jumpto/bootstrap-table-jumpto.js"></script>

		<link rel="stylesheet" href="perfect-scrollbar/perfect-scrollbar.css">
		<script type="text/javascript" src="perfect-scrollbar/perfect-scrollbar.js"></script>
		<script type="text/javascript" src="bootstrap/js/bootbox.js"></script>

		<link rel="stylesheet" href="myCss/semanticTableManage.css">
		<script type="text/javascript" src="myJs/semanticTableManage.js"></script>

		<!--王琛自己写的css和js-->
		<link rel="stylesheet" href="myCss/my-style.css">
		<link rel="stylesheet" href="myCss/my-build.css">

		<title></title>
	</head>
	<body>
		<div class="outerdiv">
			 <div class="leftdiv">
<!--		        <img src="img/icon2.png"/>-->
<!--		        <font>语义表管理</font>-->
		    </div>
			<div class="rightdiv my-search-box" style="display: block">
				<button id="findData" type="button" class="my-btn my-box-right" style=" margin-bottom: 10px;" onclick="selectBtnClick(this)">搜索</button>
				<!--<font class="word">英文语义:</font>-->
				<input id="wordInput" type='text'  placeholder="英文语义" class="form-control my-input my-box-right" style="border-radius: 4px;" />

				<!--<font class="wordName">中文语义:</font>-->
				<input id="wordNameInput" type='text' placeholder="中文语义" class="form-control my-input my-box-right" style="border-radius: 4px;" />

				<input id="sameIdInput" type='text' placeholder="主键ID" class="form-control my-input my-box-right" style="border-radius: 4px;" />

				<div class="handle-btn-div my-btn-group my-box-left"  style="display: inline-block;position: absolute; margin-left: 0px;">
					<!--<font class="sameId">主键ID:</font>-->
					<button id="addSemantic" type="button" class="btn blue-btn my-group-btn" >新建</button>
					<button id="delSemantic" type="button" class="btn blue-btn my-group-btn" >删除</button>
					<button id="export" type="button" class="btn blue-btn my-group-btn" >导出</button>
					<button id="import" type="button" class="btn blue-btn my-group-btn" >导入</button>
				</div>
			</div>

		    <div class="bottomdiv" id="contentPagin">
				 <table id="semanticTableManageTable" class="table table-striped table-hover">
				</table>
			 </div>
		</div>

		<!-- 新建语义信息 -->
		<div class="modal fade my-dialog" id="addSemanticModal" tabindex="-1" role="dialog"
			 aria-labelledby="myModalLabel" aria-hidden="true" data-backdrop='static'>
			<div class="modal-dialog">
				<div class="modal-content" style="width: 800px;margin-left: -130px">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
						<p class="modal-title" id="addSemanticModalTitle" style="color: #fff; font-size: 16px;">新建语义</p>
					</div>
					<div class="modal-body">
                        <div  class="form-group row">
                            <label  class="col-xs-2 control-label sourceLabel"><span style="color: red">*</span>主键ID：</label>
                            <div class="col-xs-2">
                                <input id="sameIdModal" type="text" placeholder="" class="form-control no-padding"
                                       style="width: 220px;height:32px;" >
                            </div>
                            <label  class="col-xs-2 control-label sourceLabel" style="margin-left: 100px"><span style="color: red">*</span>中文语义：</label>
                            <div class="col-xs-2">
                                <input id="wordNameModal" type="text" placeholder="" class="form-control no-padding"
                                       style="width: 220px;height:32px;" >
                            </div>
                        </div>
                        <div  class="form-group row">
                            <label  class="col-xs-2 control-label sourceLabel"><span style="color: red">*</span>英文语义：</label>
                            <div class="col-xs-2">
                                <input id="wordModal" type="text" placeholder="" class="form-control no-padding"
                                       style="width: 220px;height:32px;" >
                            </div>
                            <label  class="col-xs-2 control-label sourceLabel" style="margin-left: 100px">备注信息：</label>
                            <div class="col-xs-2">
                                <input id="memoModal" type="text" placeholder="" class="form-control no-padding"
                                       style="width: 220px;height:32px;" >
                            </div>
                        </div>

					</div>
					<div class="modal-footer">
<!--                        <button type="button" class="btn btn-default saveNewSemantic">保存</button>-->
<!--						<button type="button" class="btn btn-default"-->
<!--								data-dismiss="modal" >关闭</button>-->
						<div  style="display: inline-block" class="saveNewSemantic btn my-btn-confirm" >保存</div>
						<div  style="display: inline-block" class="btn my-btn-cancle" data-dismiss="modal">关闭</div>

					</div>
				</div>
			</div>
		</div>

		<!--查看关联元素集表 -->
		<div class="modal fade my-dialog" id="relatedTable" tabindex="-1" role="dialog" aria-labelledby="myModalLabel"
             aria-hidden="true" data-backdrop='static'>
			<div class="modal-dialog" style="width: 700px">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
						<h4 class="modal-title" style="color: #fff; font-size: 16px;float:left;" >【】关联元素集信息</h4>
					</div>
					<div class="modal-body">
						<div class="southDiv">
							<table id="tableNames" class="table table-striped table-hover" >
							</table>
						</div>
					</div>
					<div class="modal-footer">
						<div  style="display: inline-block" class="btn my-btn-cancle"  data-dismiss="modal">关闭</div>
<!--						<button type="button" class="querybtn"-->
<!--								data-dismiss="modal" >关闭</button>-->
					</div>
				</div>
			</div>
		</div>

        <div id="importSemanticTable" class="modal fade bs-modal-lg my-dialog" tabindex="-1" role="dialog"
             aria-labelledby="myModalLabel" aria-hidden="true" data-backdrop='static'>
            <div class="modal-dialog modal-lg" style="width: 700px">
                <div class="modal-content">
                    <div class="modal-header bg-primary">
                        <button type="button" class="close" data-dismiss="modal" aria-hidden="true"></button>
						<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                        <h4 class="modal-title" style="color: #fff; font-size: 16px;float: left">语义表基本信息导入</h4>
                    </div>
                    <div class="modal-body">
                        <form id="xlsFile" method="post">
                            <div title="语义表基本信息导入" style="padding: 5px">
                                <input type="hidden" id="AttachGUID" name="AttachGUID" />
                                <input id="semanticFile" name="semanticFile" multiple type="file" data-show-caption="true">
                            </div>
                        </form>
                        <div id="response">
                        </div>

                    </div>
                    <div class="modal-footer">
<!--						<button type="button" class="querybtn" onclick="downTemplateFile()" >下载模板文件</button>-->
<!--                        <button type="button" class="querybtn" data-dismiss="modal">关闭</button>-->
						<div  style="display: inline-block;" class="btn my-btn-confirm" onclick="downTemplateFile()">下载模板文件</div>
						<div  style="display: inline-block" class="btn my-btn-cancle"  data-dismiss="modal">关闭</div>
                    </div>
                </div>
            </div>
        </div>
	</body>
</html>
